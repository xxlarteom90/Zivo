services:
  postgres:
    image: postgres:16-alpine
    container_name: delivery-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-delivery_app}
      POSTGRES_USER: ${POSTGRES_USER:-delivery_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-delivery_app_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-delivery_app} -d ${POSTGRES_DB:-delivery_app}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
